<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabelCrop Pro | Bulk E-commerce Tool</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-10 font-sans">

    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-2xl p-6 md:p-10">
        <h1 class="text-3xl font-black text-blue-600 text-center mb-2">KISHORE ENTERPRISES <BR> LABEL CROP </h1>
        <p class="text-gray-500 text-center mb-8 italic">Fast. Private. No Server.</p>
        
        <div class="mb-6">
            <label class="block text-sm font-bold text-gray-700 mb-2 uppercase">1. Select Platform</label>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="setPlatform('flipkart', this)" class="plat-btn bg-blue-600 text-white py-3 rounded-xl font-bold transition-all shadow-md">Flipkart</button>
                <button onclick="setPlatform('meesho', this)" class="plat-btn bg-gray-100 text-gray-600 py-3 rounded-xl font-bold transition-all">Meesho</button>
                <button onclick="setPlatform('amazon', this)" class="plat-btn bg-gray-100 text-gray-600 py-3 rounded-xl font-bold transition-all">Amazon</button>
            </div>
        </div>

        <div class="mb-8">
            <label class="block text-sm font-bold text-gray-700 mb-2 uppercase">2. Select Layout</label>
            <div class="flex space-x-4">
                <label class="flex-1 border-2 border-gray-100 p-4 rounded-xl cursor-pointer hover:bg-blue-50 transition-colors">
                    <input type="radio" name="layout" value="thermal" checked class="mr-2"> 
                    <span class="font-semibold text-gray-700">Thermal (4x6)</span>
                </label>
                <label class="flex-1 border-2 border-gray-100 p-4 rounded-xl cursor-pointer hover:bg-blue-50 transition-colors">
                    <input type="radio" name="layout" value="a4_grid" class="mr-2"> 
                    <span class="font-semibold text-gray-700">A4 (4-in-1 Grid)</span>
                </label>
            </div>
        </div>

        <div id="dropzone" class="border-4 border-dashed border-blue-50 rounded-2xl p-12 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-all">
            <input type="file" id="fileInput" class="hidden" accept="application/pdf">
            <div class="text-blue-500 text-5xl mb-4">📄</div>
            <p class="text-lg font-bold text-gray-700">Upload Label PDF</p>
            <p class="text-sm text-gray-400 mt-1">Works with bulk downloads</p>
        </div>

        <div id="status" class="mt-6 text-center text-sm font-bold text-blue-600 hidden animate-pulse italic">
            ✂️ Snipping your labels... please wait...
        </div>
    </div>

    <script>
        const { PDFDocument, rgb } = PDFLib;
        let selectedPlatform = 'flipkart';
        let cropFactor = 0.455;

        function setPlatform(name, btn) {
            selectedPlatform = name;
            if(name === 'flipkart') cropFactor = 0.455;
            if(name === 'meesho') cropFactor = 0.413;
            if(name === 'amazon') cropFactor = 0.42;

            document.querySelectorAll('.plat-btn').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white', 'shadow-md');
                b.classList.add('bg-gray-100', 'text-gray-600');
            });
            btn.classList.add('bg-blue-600', 'text-white', 'shadow-md');
            btn.classList.remove('bg-gray-100', 'text-gray-600');
        }

        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const status = document.getElementById('status');

        dropzone.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.classList.remove('hidden');
            const layoutType = document.querySelector('input[name="layout"]:checked').value;

            try {
                const arrayBuffer = await file.arrayBuffer();
                const sourcePdf = await PDFDocument.load(arrayBuffer);
                const outPdf = await PDFDocument.create();
                
                const pages = sourcePdf.getPages();

                if (layoutType === 'thermal') {
                    for (let i = 0; i < pages.length; i++) {
                        const [page] = await outPdf.copyPages(sourcePdf, [i]);
                        const { width, height } = page.getSize();
                        // Crop the top portion based on platform factor
                        page.setCropBox(0, height * (1 - cropFactor), width, height);
                        outPdf.addPage(page);
                    }
                } else {
                    // 4-in-1 A4 Grid Logic
                    let currentPage;
                    for (let i = 0; i < pages.length; i++) {
                        if (i % 4 === 0) currentPage = outPdf.addPage([595, 842]); // Standard A4
                        
                        const embeddedPage = await outPdf.embedPage(pages[i]);
                        const { width, height } = pages[i].getSize();
                        
                        // Dimensions for a 2x2 grid
                        const drawW = 280; 
                        const drawH = (height * cropFactor) * (280 / width);
                        
                        const xPos = (i % 2 === 0) ? 10 : 305;
                        const yPos = (Math.floor(i / 2) % 2 === 0) ? 842 - drawH - 10 : 842 - (drawH * 2) - 40;

                        currentPage.drawPage(embeddedPage, {
                            x: xPos, y: yPos, width: drawW, height: drawH,
                            clipAsProperty: { x: 0, y: height * (1 - cropFactor), width, height: height * cropFactor }
                        });
                    }
                }

                const pdfBytes = await outPdf.save();
                download(pdfBytes, `${selectedPlatform}_labels_ready.pdf`);
                status.innerText = "✅ Success! File Downloaded.";
            } catch (err) {
                console.error(err);
                status.innerText = "❌ Something went wrong.";
            }
        };

        function download(bytes, filename) {
            const blob = new Blob([bytes], { type: "application/pdf" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }
    </script>
</body>
</html>
